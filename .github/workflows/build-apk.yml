name: Build APK
on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Enter your Google Drive File ID'
        required: true
      build_type:
        description: 'Select build variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gdown
      run: pip install gdown

    - name: Try gdown with full URL
      run: |
        gdown "https://drive.google.com/file/d/${{ github.event.inputs.file_id }}/view?usp=sharing" -O project.zip || \
        wget --no-check-certificate "https://drive.google.com/uc?export=download&id=${{ github.event.inputs.file_id }}&confirm=t" -O project.zip

    - name: Unzip project
      run: unzip project.zip -d project

    # Find the project root (where settings.gradle* exists)
    - name: Locate project root
      id: find_root
      run: |
        cd project
        # Look for settings.gradle or settings.gradle.kts in current folder
        if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
          ROOT="."
        else
          # Search one level deeper
          ROOT=$(find . -maxdepth 2 -name "settings.gradle*" -type f -exec dirname {} \; | head -1)
          if [ -z "$ROOT" ]; then
            echo "Could not find settings.gradle - please check your project structure."
            exit 1
          fi
        fi
        # Remove leading "./" if present
        ROOT=${ROOT#./}
        # Build a clean path relative to the workspace
        if [ "$ROOT" = "." ]; then
          PROJECT_PATH="project"
        else
          PROJECT_PATH="project/$ROOT"
        fi
        echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
        echo "Found project path: $PROJECT_PATH"

    # Make gradlew executable if it exists
    - name: Make gradlew executable
      run: |
        if [ -f "${{ env.PROJECT_PATH }}/gradlew" ]; then
          chmod +x "${{ env.PROJECT_PATH }}/gradlew"
          echo "GRADLE_EXE=./gradlew" >> $GITHUB_ENV
        else
          echo "gradlew not found, will use system gradle"
          echo "GRADLE_EXE=gradle" >> $GITHUB_ENV
        fi

    # Patch app/build.gradle to use debug signing for release (only for release builds)
    - name: Patch app/build.gradle to use debug signing for release
      if: github.event.inputs.build_type == 'release'
      run: |
        BUILD_FILE="${{ env.PROJECT_PATH }}/app/build.gradle"
        if [ -f "$BUILD_FILE" ]; then
          if ! grep -q "signingConfig signingConfigs.debug" "$BUILD_FILE"; then
            sed -i '/release {/a\            signingConfig signingConfigs.debug' "$BUILD_FILE"
            echo "Patched $BUILD_FILE to use debug signing for release."
          else
            echo "Already patched, skipping."
          fi
        else
          echo "Could not find app/build.gradle - make sure your project structure is standard."
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Build APK
      run: |
        cd ${{ env.PROJECT_PATH }}
        ${{ env.GRADLE_EXE }} assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App-${{ github.event.inputs.build_type }}
        path: ${{ env.PROJECT_PATH }}/app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
