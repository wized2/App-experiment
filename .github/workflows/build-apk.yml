name: Build APK
on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Enter your Google Drive File ID'
        required: true
      build_type:
        description: 'Select build variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gdown
      run: pip install gdown

    - name: Try gdown with full URL
      run: |
        gdown "https://drive.google.com/file/d/${{ github.event.inputs.file_id }}/view?usp=sharing" -O project.zip || \
        wget --no-check-certificate "https://drive.google.com/uc?export=download&id=${{ github.event.inputs.file_id }}&confirm=t" -O project.zip

    - name: Unzip project
      run: unzip project.zip -d project

    # Find the root directory that contains gradlew
    - name: Locate project root
      id: find_root
      run: |
        cd project
        GRADLEW_PATH=$(find . -name "gradlew" -type f -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "gradlew not found in the extracted files."
          exit 1
        fi
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
        echo "Found gradlew in: $PROJECT_ROOT"

    # Make gradlew executable
    - name: Make gradlew executable
      run: chmod +x project/${{ env.PROJECT_ROOT }}/gradlew

    # Patch app/build.gradle for release builds
    - name: Patch app/build.gradle to use debug signing for release
      if: github.event.inputs.build_type == 'release'
      run: |
        cd project/${{ env.PROJECT_ROOT }}
        BUILD_FILE="app/build.gradle"
        if [ -f "$BUILD_FILE" ]; then
          sed -i '/release {/a\            signingConfig signingConfigs.debug' "$BUILD_FILE"
          echo "Patched $BUILD_FILE to use debug signing for release."
        else
          echo "Could not find app/build.gradle - make sure your project structure is standard."
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Build APK
      run: |
        cd project/${{ env.PROJECT_ROOT }}
        ./gradlew assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App-${{ github.event.inputs.build_type }}
        path: project/${{ env.PROJECT_ROOT }}/app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
