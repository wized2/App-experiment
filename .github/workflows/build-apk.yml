name: Build APK
on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Enter your Google Drive File ID (e.g., 1rYd1xgF_Z3GtzDQTOfUXf9FkyMwg_cB_)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gdown
      run: pip install gdown

    - name: Download from Google Drive
      run: gdown "${{ github.event.inputs.file_id }}" -O project.zip

    - name: Unzip project
      run: unzip project.zip -d project

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Build APK
      run: |
        cd project/clock-widget
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App
        path: project/clock-widget/app/build/outputs/apk/debug/*.apk
