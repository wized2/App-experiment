name: Build APK
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Paste your Google Drive direct link here'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Download your ZIP
      run: wget -O project.zip "${{ github.event.inputs.zip_url }}"
      
    - name: Unzip project
      run: unzip project.zip -d project
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Gradle (No wrapper needed!)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        
    - name: Build APK
      run: |
        cd project/clock-widget
        gradle assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App
        path: project/clock-widget/app/build/outputs/apk/debug/*.apk
